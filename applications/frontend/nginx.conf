server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression des reponses texte (HTML / JS / CSS / JSON / SVG)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Securite minimale (Strict-Transport-Security est gere par l'ALB).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Health check de l'ALB (NestJS expose /health hors prefixe /api).
    location = /health {
        proxy_pass http://backend:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # API NestJS (prefixe /api) — proxy vers le conteneur backend.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookies httpOnly d'auth (memes domaine front et API → pas de reecriture).
        proxy_pass_header Set-Cookie;

        # Pas de buffering : permet le streaming et evite la latence ajoutee.
        proxy_buffering off;
        proxy_read_timeout 60s;

        client_max_body_size 10m;
    }

    # Cache aggressif pour les assets versionnes par Vite (hash dans le nom).
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback SPA — toute route non resolue renvoie index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html : jamais en cache (les assets hashes le sont).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
