services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: questionnaire_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d questionnaire_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data_dev:
