name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace libraries
        run: pnpm run build:libs

      - name: Lint (Biome + guard backend imports)
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Backend tests
        run: pnpm --filter @aor/backend-api run test

      - name: Frontend tests
        run: pnpm --filter @aor/frontend-app run test

      - name: Build
        run: pnpm run build
